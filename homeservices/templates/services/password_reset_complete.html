{% extends 'base.html' %}

{% block title %}Password Reset Complete - HomeFix{% endblock %}

{% block extra_css %}
<style>
    .hero-section { background-color: #004080; color: white; padding: 100px 0 140px; position: relative; overflow: hidden; }
    .wave-divider { position: absolute; bottom: 0; left: 0; width: 100%; overflow: hidden; line-height: 0; }
    .wave-divider svg { position: relative; display: block; width: calc(100% + 1.3px); height: 70px; }
    .wave-divider .shape-fill { fill: #f4f7fb; }
    .reset-card { border: none; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
</style>
{% endblock %}

{% block content %}
<div class="hero-section text-center">
    <div class="container">
        <i class="fas fa-check-circle mb-3 text-success" style="font-size: 2.5rem; opacity: 0.95;"></i>
        <h1 class="display-4 fw-bold mb-2">Password Changed</h1>
    </div>
    <div class="wave-divider">
        <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
            <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z" class="shape-fill"></path>
        </svg>
    </div>
</div>

<div class="container py-5 mb-5" style="margin-top: -60px; position: relative; z-index: 10;">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card reset-card text-center">
                <div class="card-body p-4 p-md-5">
                    <h4 class="fw-bold mb-3">You're All Set!</h4>
                    <p class="text-muted mb-4">Your password has been set. You may go ahead and log in now.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary btn-lg fw-bold rounded-pill px-5">Log In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
